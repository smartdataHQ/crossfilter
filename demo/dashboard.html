<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo.css">
  <!-- Shoelace: light theme + component autoloader -->
  <link rel="stylesheet" href="../node_modules/@shoelace-style/shoelace/dist/themes/light.css">
  <!-- flatpickr: date range picker -->
  <link rel="stylesheet" href="../node_modules/flatpickr/dist/flatpickr.min.css">
  <!-- noUiSlider: dual-handle range slider -->
  <link rel="stylesheet" href="../node_modules/nouislider/dist/nouislider.min.css">
</head>
<body>
<script src="../node_modules/flatpickr/dist/flatpickr.min.js"></script>
<script src="../node_modules/nouislider/dist/nouislider.min.js"></script>
<!-- Shoelace autoloader: registers custom elements on demand -->
<script type="module">
  import '../node_modules/@shoelace-style/shoelace/dist/shoelace-autoloader.js';
  // Set base path for Shoelace assets (icons etc.)
  import { setBasePath } from '../node_modules/@shoelace-style/shoelace/dist/utilities/base-path.js';
  setBasePath('../node_modules/@shoelace-style/shoelace/dist');
</script>
<div id="error-banner" class="error-banner" hidden></div>
<div id="dashboard" class="dashboard"></div>
<script src="../crossfilter.js"></script>
<script src="../node_modules/echarts/dist/echarts.min.js"></script>
<script type="module" src="dashboard-engine.js"></script>
</body>
</html>
