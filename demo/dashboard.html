<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo.css">
  <!-- Shoelace: light theme from CDN (bundled with Lit) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css">
  <!-- flatpickr: date range picker -->
  <link rel="stylesheet" href="../node_modules/flatpickr/dist/flatpickr.min.css">
  <!-- noUiSlider: dual-handle range slider -->
  <link rel="stylesheet" href="../node_modules/nouislider/dist/nouislider.min.css">
</head>
<body>
<script src="../node_modules/flatpickr/dist/flatpickr.min.js"></script>
<script src="../node_modules/nouislider/dist/nouislider.min.js"></script>
<!-- Shoelace: cherry-pick components from CDN (includes Lit) -->
<script type="module">
  import { setBasePath } from 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/utilities/base-path.js';
  setBasePath('https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn');
  import 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/select/select.js';
  import 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/option/option.js';
  import 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/tooltip/tooltip.js';
  import 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/components/tag/tag.js';
</script>
<div id="error-banner" class="error-banner" hidden></div>
<div id="dashboard" class="dashboard"></div>
<script src="../crossfilter.js"></script>
<script src="../node_modules/echarts/dist/echarts.min.js"></script>
<script type="module" src="dashboard-engine.js"></script>
</body>
</html>
